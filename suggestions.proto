syntax = “proto3”;

package homelayout.v1;

import “homelayout/v1/room.proto”;

option go_package = “github.com/magic-pro/Arch-myway/gen/go”;

// ─────────────────────────────────────────
// DESIGN SUGGESTION — Core suggestion model
// ─────────────────────────────────────────

message DesignSuggestion {
string          suggestion_id   = 1;
RoomType        room_type       = 2;
string          title           = 3;
string          description     = 4;
repeated string furniture_items = 5;
repeated string decor_accents   = 6;
repeated string color_hex_codes = 7;
string          lighting_tips   = 8;
repeated string plant_ideas     = 9;
string          focal_point     = 10; // “fireplace”, “gallery wall”
repeated string image_urls      = 11; // mood board references
float           match_score     = 12; // 0.0 - 1.0 confidence
}

// ─────────────────────────────────────────
// ROOM-SPECIFIC SUGGESTIONS
// ─────────────────────────────────────────

message LivingRoomSuggestion {
DesignSuggestion base                = 1;
string           sofa_layout         = 2; // “L-shape”, “U-shape”, “facing”
bool             open_plan           = 3;
string           entertainment_setup = 4;
}

message BedroomSuggestion {
DesignSuggestion base               = 1;
string           bed_size           = 2; // “king”, “queen”, “twin”
string           bed_placement      = 3; // “north wall”, “center”
bool             has_walk_in_closet = 4;
string           ambiance           = 5; // “cozy”, “airy”, “romantic”
}

message StudySuggestion {
DesignSuggestion base             = 1;
string           desk_type        = 2; // “standing”, “L-shaped”, “writing”
string           storage_style    = 3; // “floating shelves”, “built-ins”
string           ergonomic_tips   = 4;
bool             has_reading_nook = 5;
}

// ─────────────────────────────────────────
// PHOTO ANALYSIS
// ─────────────────────────────────────────

message RoomPhotoRequest {
string room_id    = 1;
bytes  image_data = 2;
string mime_type  = 3; // “image/jpeg”, “image/png”
}

message RoomAnalysisResponse {
string          detected_style = 1;
repeated string issues         = 2;
repeated string improvements   = 3;
}
